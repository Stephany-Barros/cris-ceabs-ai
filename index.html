<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cris IA - Painel CEABS</title>
    <style>
        :root { --primary: #004a99; --secondary: #00a1e4; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; width: 90%; max-width: 450px; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        .logo { font-weight: bold; color: var(--primary); font-size: 26px; margin-bottom: 25px; }
        .btn-mic { background: var(--primary); color: white; border: none; width: 90px; height: 90px; border-radius: 50%; font-size: 35px; cursor: pointer; transition: 0.3s; display: inline-flex; justify-content: center; align-items: center; margin: 0 auto; }
        .btn-mic:hover { transform: scale(1.05); background: var(--secondary); }
        .btn-mic.active { animation: pulse 1.5s infinite; background: #ff4b4b; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255,75,75,0.7); } 70% { box-shadow: 0 0 0 20px rgba(255,75,75,0); } 100% { box-shadow: 0 0 0 0 rgba(255,75,75,0); } }
        .chat-box { text-align: left; margin-top: 30px; }
        .label { font-size: 11px; color: #999; text-transform: uppercase; font-weight: bold; margin-bottom: 5px; letter-spacing: 1px; }
        .text-output { background: #f8f9fa; padding: 15px; border-radius: 10px; border-left: 4px solid var(--primary); margin-bottom: 20px; font-size: 14px; color: #333; min-height: 20px; }
        #status { font-size: 14px; color: var(--secondary); font-weight: 500; margin-top: 20px; height: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">CEABS <span style="color:var(--secondary)">CRIS IA</span></div>
    
    <button class="btn-mic" id="btnAction">🎤</button>
    <div id="status">Clique para iniciar</div>

    <div class="chat-box">
        <div class="label">Você disse:</div>
        <div class="text-output" id="userText">---</div>

        <div class="label">Cris respondeu:</div>
        <div class="text-output" id="crisText">---</div>
    </div>
</div>

<script>
    const API_ENDPOINT = "https://x0ht8akouf.execute-api.sa-east-1.amazonaws.com/";
    const btn = document.getElementById('btnAction');
    const status = document.getElementById('status');
    const userText = document.getElementById('userText');
    const crisText = document.getElementById('crisText');

    let mediaRecorder;
    let audioChunks = [];

    btn.onclick = async () => {
        if (btn.classList.contains('active')) {
            // PARAR GRAVAÇÃO
            mediaRecorder.stop();
            btn.classList.remove('active');
            status.innerText = "Enviando áudio...";
        } else {
            // INICIAR GRAVAÇÃO
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];

            mediaRecorder.ondataavailable = (event) => audioChunks.push(event.data);
            
            mediaRecorder.onstop = async () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/ogg' });
                const reader = new FileReader();
                reader.readAsDataURL(audioBlob);
                reader.onloadend = async () => {
                    const base64Audio = reader.result.split(',')[1];
                    enviarParaAWS(base64Audio);
                };
            };

            mediaRecorder.start();
            btn.classList.add('active');
            status.innerText = "Gravando... Clique de novo para parar.";
        }
    };

    async function enviarParaAWS(base64Audio) {
        status.innerText = "A Cris está processando...";
        try {
            const response = await fetch(API_ENDPOINT, {
                method: 'POST',
                // O segredo está no JSON em maiúsculo aqui embaixo:
                body: JSON.stringify({ audio_base64: base64Audio }) 
            });
            const data = await response.json();

            userText.innerText = data.ouvi || "---";
            crisText.innerText = data.cris_respondeu || "---";
            
     if (data.audio_64) {
                const audio = new Audio("data:audio/mp3;base64," + data.audio_64);
                audio.play();
                
                // Quando a Cris terminar de falar, o botão reseta para "Continuar"
                audio.onended = () => {
                    status.innerText = "Deseja perguntar algo mais?";
                    btn.innerHTML = "➕"; // Ícone de adicionar ou continuar
                    btn.style.background = "#28a745"; // Cor verde de sucesso
                };
            }
</script>
</body>
</html>
