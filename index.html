<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cris Voz AI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Inter, sans-serif;
    background: linear-gradient(135deg,#0b1f3a,#0f355e);
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    color: white;
}

.card {
    width: 420px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    padding: 30px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
}

h1 {
    font-size: 20px;
    margin-bottom: 25px;
}

button {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    background: #1e5eff;
    color: white;
    font-size: 14px;
    font-weight: bold;
    transition: .3s;
}

button.active {
    background: #e74c3c;
    transform: scale(1.05);
    box-shadow: 0 0 25px rgba(231,76,60,.5);
}

#status {
    margin-top: 20px;
    font-size: 14px;
    opacity: .8;
}

#chat {
    margin-top: 20px;
    text-align: left;
    font-size: 13px;
    max-height: 180px;
    overflow-y: auto;
    padding: 10px;
    background: rgba(0,0,0,0.2);
    border-radius: 12px;
}
</style>
</head>

<body>

<div class="card">
    <h1>🎙️ Cris Voz AI</h1>

    <button id="micBtn">FALAR</button>

    <div id="status">Conectando...</div>
    <div id="chat"></div>
</div>

<script>
const WS_URL = "wss://egvdqa1n2e.execute-api.us-east-1.amazonaws.com/production";

let socket;
let recognition;
let isMicOn = false;

const micBtn = document.getElementById("micBtn");
const status = document.getElementById("status");
const chat = document.getElementById("chat");

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

// sessão persistente
const sessionId = crypto.randomUUID();

// Função para converter o Markdown do Claude (**negrito**) para HTML (<b>)
function formatarMarkdown(texto) {
    if (!texto) return "";
    return texto.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
}

// -------------------- WS INIT (1x só) --------------------
function initWebSocket() {
    socket = new WebSocket(WS_URL);

    socket.onopen = () => {
        status.innerText = "Conectado ✔️";
    };

    socket.onmessage = (e) => {
        const data = JSON.parse(e.data);

        // Processa o retorno textual (chat_display) enviado pela nova arquitetura da Lambda
        if (data.chat_display) {
            const textoFormatado = formatarMarkdown(data.chat_display);
            chat.innerHTML += `<div><b>Cris:</b> ${textoFormatado}</div>`;
            
            // Mantém a rolagem do chat sempre na última mensagem
            chat.scrollTop = chat.scrollHeight;
        }

        // Processa e executa o áudio gerado via Polly com SSML
        if (data.audio_64) {
            const audio = new Audio("data:audio/mp3;base64," + data.audio_64);
            audio.play().catch((err)=>{ console.error("Erro ao reproduzir áudio:", err) });
        }
    };

    socket.onclose = () => {
        status.innerText = "Desconectado";
    };

    socket.onerror = () => {
        status.innerText = "Erro na conexão";
    };
}


// -------------------- MIC CONTROL --------------------
function startMic() {
    recognition = new SpeechRecognition();
    recognition.lang = "pt-BR";
    recognition.continuous = false;

    recognition.onresult = (e) => {
        const text = e.results[0][0].transcript;

        chat.innerHTML += `<div><b>Você:</b> ${text}</div>`;
        chat.scrollTop = chat.scrollHeight;

        if (socket.readyState === WebSocket.OPEN) {
            socket.send(JSON.stringify({
                action: "sendText",
                text: text
            }));
        }
    };

    recognition.onend = () => {
        if (isMicOn) recognition.start();
    };

    recognition.start();
}

function stopMic() {
    if (recognition) recognition.stop();
}


// -------------------- BUTTON INTERACTION --------------------
micBtn.onclick = () => {

    if (!socket) initWebSocket();

    if (!isMicOn) {
        isMicOn = true;
        micBtn.classList.add("active");
        micBtn.innerText = "PARAR";
        status.innerText = "Ouvindo...";
        startMic();
    } else {
        isMicOn = false;
        micBtn.classList.remove("active");
        micBtn.innerText = "FALAR";
        status.innerText = "Microfone parado";
        stopMic();
    }
};
</script>

</body>
</html>
