<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cris IA - Voz CEABS</title>
    <style>
        :root { 
            --primary: #002d5e;   /* Azul Marinho CEABS */
            --secondary: #ff8c00; /* Laranja CEABS */
            --bg: #f4f7f6; 
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        
        .container { background: white; width: 95%; max-width: 400px; padding: 40px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; }
        .logo { font-weight: 800; color: var(--primary); font-size: 26px; margin-bottom: 30px; letter-spacing: -1px; }
        
        .voice-section { margin-bottom: 10px; }
        .btn-mic { background: var(--primary); color: white; border: none; width: 100px; height: 100px; border-radius: 50%; font-size: 40px; cursor: pointer; transition: 0.3s; display: inline-flex; justify-content: center; align-items: center; outline: none; box-shadow: 0 8px 20px rgba(0,45,94,0.3); }
        
        .btn-mic.active { animation: pulse 1.5s infinite; background: #ff4b4b; transform: scale(1.1); }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255,75,75,0.7); } 70% { box-shadow: 0 0 0 20px rgba(255,75,75,0); } 100% { box-shadow: 0 0 0 0 rgba(255,75,75,0); } }
        
        #status { font-size: 14px; color: #666; margin-top: 20px; font-weight: 500; min-height: 20px; }
        .hint { font-size: 12px; color: #bbb; margin-top: 10px; }
        
        #transcript { margin-top: 25px; font-style: italic; color: var(--primary); font-size: 14px; line-height: 1.4; padding: 10px; background: #f9f9f9; border-radius: 10px; min-height: 40px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">CEABS <span style="color:var(--secondary)">CRIS VOZ</span></div>
    
    <div class="voice-section">
        <button class="btn-mic" id="btnAction">🎤</button>
        <div id="status">Clique para iniciar o atendimento</div>
        <div class="hint">Fale sobre agendamento, suporte ou serviços.</div>
    </div>

    <div id="transcript"></div>
</div>

<script>
    // Endpoint do seu API Gateway (Rota de Voz)
    const WS_URL = "wss://egvdqa1n2e.execute-api.us-east-1.amazonaws.com/production/";
    let socket;

    const btnMic = document.getElementById('btnAction');
    const status = document.getElementById('status');

    btnMic.onclick = () => {
        if (!socket || socket.readyState !== WebSocket.OPEN) {
            status.innerText = "Conectando à Cris...";
            socket = new WebSocket(WS_URL);

            socket.onopen = () => {
                status.innerText = "Conectado! Pode falar.";
                btnMic.classList.add('active');
                // Envia uma mensagem de teste para a rota 'sendAudio' que você criou
                socket.send(JSON.stringify({ action: "sendAudio", data: "Teste de conexão" }));
            };

            socket.onmessage = (event) => {
                console.log("Resposta da Cris:", event.data);
                // Aqui você pode adicionar lógica para dar play no áudio que a Lambda enviar
            };

            socket.onclose = () => {
                status.innerText = "Conexão encerrada.";
                btnMic.classList.remove('active');
            };

            socket.onerror = (err) => {
                console.error("Erro no WebSocket:", err);
                status.innerText = "Erro na conexão.";
            };
        } else {
            socket.close();
        }
    };
</script>
</body>
</html>
