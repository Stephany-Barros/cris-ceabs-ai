<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cris IA - Painel CEABS</title>
    <style>
        :root{--primario: #004a99;--secundario: #00a1e4; }
        body{font-family: 'Segoe UI',Tahoma,sans-serif;fundo: #f0f2f5;mostrar:flexível;justificar-conteúdo:centro;alinhar-itens:centro;altura:100vh;margem:0;}
        .recipiente{fundo:branco;largura: 90%;largura-máxima: 450px;acolchoamento: 40px;raio-da-borda: 20px;sombra de caixa: 0 10px 30px rgba(0,0,0,0,1);alinhamento-de-texto:centro;}
        .logotipo{peso da fonte:audacioso;cor: var(--primario);tamanho da fonte: 26px;margem inferior: 25px; }
        .btn-mic{fundo: var(--primario);cor:branco;fronteira:nenhum;largura: 90px;altura: 90px;raio-da-borda: 50%;tamanho da fonte: 35px;cursor:ponteiro;transição:0.3s;}
        .btn-mic:pairar{transformar: escala(1.05);fundo: var(--secundario); }
        .btn-mic.ativo{animação:pulso1,5sinfinito;fundo: #ff4b4b; }
        @keyframespulso {0%{sombra de caixa: 0 0 0 0 rgba(255,75,75,0,7); }70%{sombra de caixa: 0 0 0 20px rgba(255,75,75,0); }100%{sombra de caixa: 0 0 0 0 rgba(255,75,75,0); }}
        .caixa de bate-papo{alinhamento de texto:esquerda;margem superior: 30px; }
        .rótulo{tamanho da fonte: 11px;cor: #999;transformação de texto:maiúsculas;peso da fonte:audacioso;margem inferior: 5px;espaçamento entre letras: 1px; }
        .saída de texto{fundo: #f8f9fa;acolchoamento: 15px;raio-da-borda: 10px;fronteira esquerda: 4pxsólido var(--primario);margem inferior: 20px;tamanho da fonte: 14px;cor: #333;mín-altura: 20px;}
        #status{tamanho da fonte: 14px;cor: var(--secundario);peso da fonte: 500;margem superior: 20px;altura: 20px; }
    </style>
</head>
<body>

<div class="recipiente">
    <div class="logotipo">CEABS <span style="color:var(--secundario)">CRIS IA</span></div>
    
    <button class="btn-mic" id="btnAction">🎤</button>
    <div id="status">Clique para iniciar</div>

    <div class="caixa de bate-papo">
        <div class="rótulo">Você disse:</div>
        <div class="saída de texto" id="userText">---</div>

        <div class="rótulo">Cris respondeu:</div>
        <div class="saída de texto" id="crisText">---</div>
    </div>
</div>

<script>
    const API_ENDPOINT = "https://x0ht8akouf.execute-api.sa-east-1.amazonaws.com/";

    const btn = document.getElementById('btnAction');
    const status = document.getElementById('status');
    const userText = document.getElementById('userText');
    const crisText = document.getElementById('crisText');

    btn.onclick = async () => {
        btn.classList.add('ativo');
        status.innerText = "A Cris está processando...";
        userText.innerText = "---";
        crisText.innerText = "---";

        try {
            const response = await fetch(API_ENDPOINT);
            if (!response.ok) throw new Error("Erro na rede");
            
            const data = await response.json();

            // 1. Tocar Pergunta
            if (data.audio_pergunta_64) {
                status.innerText = "Ouvindo pergunta...";
                const audioP = new Audio("data:audio/ogg;base64," + data.audio_pergunta_64);
                await new Promise(res => { audioP.onended = res; audioP.play(); });
            }

            await new Promise(r => setTimeout(r, 500));

            // 2. Atualizar Textos
            userText.innerText = data.ouvi || "---";
            crisText.innerText = data.cris_respondeu || "---";
            status.innerText = "Cris respondendo...";

            // 3. Tocar Resposta
            if (data.audio_64) {
                const audioC = new Audio("data:audio/mp3;base64," + data.audio_64);
                audioC.play();
            }

            status.innerText = "Atendimento concluído!";
        } catch (err) {
            status.innerText = "Erro ao falar com a Cris.";
            console.error(err);
        } finally {
            btn.classList.remove('ativo');
        }
    };
</script>

</body>
</html>
